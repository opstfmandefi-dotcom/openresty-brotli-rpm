name: Release

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      openresty_versions:
        description: Optional comma-separated versions (at most two; empty discovers the latest two)
        required: false
        default: ""
      package_release:
        description: Optional RPM package release (empty uses the unique workflow run number)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    container: rockylinux:9
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
      package_release: ${{ steps.version.outputs.package_release }}
      ngx_brotli_commit: ${{ steps.ngx_brotli.outputs.commit }}
    steps:
      - name: Configure OpenResty repository
        run: |
          curl -fsSL https://openresty.org/package/rocky/openresty2.repo \
            -o /etc/yum.repos.d/openresty.repo
          dnf install -y dnf-plugins-core git
      - id: ngx_brotli
        name: Resolve latest ngx_brotli commit
        run: |
          commit="$(
            git ls-remote https://github.com/google/ngx_brotli.git HEAD |
              awk 'NR == 1 { print $1 }'
          )"
          [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "Using ngx_brotli commit: $commit"
      - id: versions
        name: Build version matrix
        env:
          REQUESTED_VERSIONS: ${{ inputs.openresty_versions }}
        run: |
          if [[ -n "$REQUESTED_VERSIONS" ]]; then
            values="$(tr ',' '\n' <<<"$REQUESTED_VERSIONS")"
          else
            values="$(dnf repoquery --repo openresty --arch x86_64 \
              --qf '%{version}' openresty)"
          fi
          values="$(
            sed '/^$/d' <<<"$values" |
              sort -Vu |
              tail -n 2
          )"
          versions="$(
            sed '/^$/d' <<<"$values" |
              while read -r version; do
                [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]
                printf '"%s",\n' "$version"
              done |
              sed '$ s/,$//' |
              awk 'BEGIN { print "[" } { print } END { print "]" }'
          )"
          compact="$(tr -d '[:space:]' <<<"$versions")"
          [[ "$compact" != "[]" ]]
          echo "versions=$compact" >> "$GITHUB_OUTPUT"
          echo "Building OpenResty versions: $compact"
      - id: version
        env:
          INPUT_RELEASE: ${{ inputs.package_release }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Scheduled runs must not reuse release 1: published releases are
          # immutable and their assets cannot be replaced with --clobber.
          release="${INPUT_RELEASE:-$RUN_NUMBER}"
          [[ "$release" =~ ^[0-9]+$ ]]
          echo "package_release=$release" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare.outputs.versions) }}
        arch: [x86_64, aarch64]
    runs-on: ${{ matrix.arch == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    container: rockylinux:9
    steps:
      - uses: actions/checkout@v4
      - name: Configure OpenResty repository
        run: |
          curl -fsSL https://openresty.org/package/rocky/openresty2.repo \
            -o /etc/yum.repos.d/openresty.repo
      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build gcc gcc-c++ make cmake git perl file \
            dnf-plugins-core openresty-${{ matrix.version }}
          for package in \
            openresty-zlib-devel \
            openresty-pcre-devel \
            openresty-pcre2-devel \
            openresty-openssl111-devel \
            openresty-openssl3-devel
          do
            if dnf repoquery --available "$package" | grep -q .; then
              dnf install -y "$package"
            fi
          done
      - name: Build RPM
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-rpm.sh \
            "${{ matrix.version }}" \
            "${{ needs.prepare.outputs.package_release }}" \
            "${{ needs.prepare.outputs.ngx_brotli_commit }}"
      - name: Smoke test
        run: ./scripts/smoke-test.sh artifacts/*.rpm
      - name: Create checksum
        working-directory: artifacts
        run: |
          sha256sum *.rpm > \
            "SHA256SUMS-${{ matrix.version }}-${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.version }}-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          path: release
          merge-multiple: true
      - name: Create public releases
        env:
          GH_TOKEN: ${{ github.token }}
          VERSIONS: ${{ needs.prepare.outputs.versions }}
          PACKAGE_RELEASE: ${{ needs.prepare.outputs.package_release }}
          NGX_BROTLI_COMMIT: ${{ needs.prepare.outputs.ngx_brotli_commit }}
        run: |
          for version in $(jq -r '.[]' <<<"$VERSIONS"); do
            tag="v${version}-${PACKAGE_RELEASE}"
            mapfile -t files < <(
              find release -type f \( \
                -name "openresty-module-brotli-${version}-*.rpm" -o \
                -name "SHA256SUMS-${version}-*" \
              \)
            )
            ((${#files[@]} >= 4))
            notes="Brotli dynamic-module RPMs for OpenResty ${version}, using ngx_brotli commit ${NGX_BROTLI_COMMIT}, built natively for x86_64 and aarch64 on Rocky Linux 9."
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release ${tag} already exists; leaving immutable release unchanged"
              continue
            fi
            gh release create "$tag" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "OpenResty Brotli module ${tag}" \
              --notes "$notes" \
              --target "$GITHUB_SHA"
          done
